<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mizaan - Full Compliance Report</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237c1522'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='20' fill='%23d4a843'>م</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ RESET & BASE ══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:10pt}
body{font-family:'Syne',sans-serif;color:#1a1410;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ══ TOKENS ════════════════════════════════════════ */
:root{
  --m:#7c1522;--m2:#9c2232;--m3:#c04050;
  --gold:#b8892a;--gold2:#d4a843;
  --cream:#f8f4ef;--cream2:#f0ebe3;--cream3:#e4dcd2;
  --ink:#1a1410;--ink2:#2d2926;--ink3:#6b6058;--ink4:#9a8e87;
  --green:#14532d;--gbg:#f0fdf4;--gbd:#bbf7d0;
  --amber:#78350f;--abg:#fffbeb;--abd:#fde68a;
  --red:#7f1d1d;--rbg:#fef2f2;--rbd:#fecaca;
  --blue:#1e3a5f;--bbg:#eff6ff;--bbd:#bfdbfe;
  --r:6px;--rl:10px;
}

/* ══ PAGE SETUP (print) ════════════════════════════ */
@page{size:A4;margin:18mm 16mm 20mm 16mm}
@media print{
  .no-print{display:none!important}
  .page-break{page-break-before:always}
  .avoid-break{page-break-inside:avoid}
  body{background:#fff}
}

/* ══ SCREEN TOOLBAR ════════════════════════════════ */
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  display:flex;align-items:center;justify-content:space-between;padding:0 2rem;
  background:var(--m);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-mark{width:30px;height:30px;background:var(--gold2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--ink)}
.tb-name{font-size:14px;font-weight:700;color:white}
.tb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-left:4px}
.tb-right{display:flex;gap:8px}
.tb-btn{height:32px;padding:0 16px;border-radius:100px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;border:none}
.tb-ghost{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2)}
.tb-ghost:hover{background:rgba(255,255,255,.2)}
.tb-print{background:var(--gold2);color:var(--ink)}
.tb-print:hover{background:white;color:var(--m)}

/* ══ MAIN WRAPPER ══════════════════════════════════ */
.wrap{max-width:820px;margin:0 auto;padding:72px 20px 60px}
@media print{.wrap{max-width:none;padding:0}}

/* ══ COVER PAGE ════════════════════════════════════ */
.cover{min-height:260mm;display:flex;flex-direction:column;position:relative;overflow:hidden}
.cover-bg{background:var(--m);padding:44px 44px 36px;position:relative;overflow:hidden;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.cover-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 110%,rgba(212,168,67,.12),transparent),radial-gradient(ellipse 40% 60% at 85% 10%,rgba(255,255,255,.04),transparent);pointer-events:none}
.cover-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.cover-top{position:relative;z-index:1}
.cover-brand{display:flex;align-items:center;gap:12px;margin-bottom:52px}
.cov-mark{width:44px;height:44px;background:var(--gold2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);flex-shrink:0}
.cov-name{font-size:20px;font-weight:700;color:white}
.cov-ar{font-family:'Noto Naskh Arabic',serif;font-size:12px;color:rgba(255,255,255,.35);display:block;margin-top:1px}
.cover-doc-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--gold2);margin-bottom:14px}
.cover-h1{font-family:'Cormorant Garamond',serif;font-size:38pt;font-weight:400;color:white;line-height:1.05;letter-spacing:-.02em;margin-bottom:8px}
.cover-h1 em{color:var(--gold2);font-style:italic}
.cover-h2{font-size:13px;color:rgba(255,255,255,.52);margin-bottom:32px}
.cover-co-row{display:flex;gap:32px;flex-wrap:wrap}
.cov-field{display:flex;flex-direction:column;gap:4px}
.cf-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.38)}
.cf-val{font-size:13px;font-weight:600;color:white}
.cover-bottom{position:relative;z-index:1;padding-top:28px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.cov-pow{font-size:10px;color:rgba(255,255,255,.3)}
.cov-pow strong{color:rgba(255,255,255,.5)}
.cov-firm{text-align:right}
.cf-firm-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.cf-firm-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
/* Score strip on cover */
.cover-score-strip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:16px 22px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:24px}
.css-item{display:flex;flex-direction:column;gap:3px}
.css-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.38)}
.css-val{font-size:16px;font-weight:600;color:white;font-family:'Cormorant Garamond',serif}
.css-val.danger{color:#fca5a5}
.css-val.warn{color:#fcd34d}
.css-val.ok{color:#86efac}
.css-div{width:1px;height:32px;background:rgba(255,255,255,.12)}

/* ══ SECTION STRUCTURE ═════════════════════════════ */
.section{margin-bottom:28px}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--cream3)}
.sec-num{width:26px;height:26px;background:var(--m);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:17pt;font-weight:500;color:var(--m);letter-spacing:-.01em}
.sub-head{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sub-head::after{content:'';flex:1;height:1px;background:var(--cream3)}

/* ══ DATA GRID ═════════════════════════════════════ */
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.dg-2{grid-template-columns:repeat(2,1fr)}
.dg-4{grid-template-columns:repeat(4,1fr)}
.dc{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);padding:10px 12px}
.dc-lbl{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin-bottom:4px}
.dc-val{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
.dc-sub{font-size:9.5px;color:var(--ink3);margin-top:3px}
.dc.red{background:var(--rbg);border-color:var(--rbd)}
.dc.red .dc-val{color:var(--red)}
.dc.amber{background:var(--abg);border-color:var(--abd)}
.dc.amber .dc-val{color:var(--amber)}
.dc.green{background:var(--gbg);border-color:var(--gbd)}
.dc.green .dc-val{color:var(--green)}
.dc.blue{background:var(--bbg);border-color:var(--bbd)}
.dc.blue .dc-val{color:var(--blue)}
.dc.maroon{background:rgba(124,21,34,.05);border-color:rgba(124,21,34,.18)}
.dc.maroon .dc-val{color:var(--m)}

/* ══ TABLE ═════════════════════════════════════════ */
.tbl{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px}
.tbl th{background:var(--cream);border:1px solid var(--cream3);padding:7px 10px;text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3)}
.tbl td{border:1px solid var(--cream3);padding:7px 10px;color:var(--ink2);vertical-align:top;line-height:1.4}
.tbl tr:nth-child(even) td{background:var(--cream)}
.tbl .total td{background:rgba(124,21,34,.05);font-weight:700;color:var(--m)}
.tbl .green td{background:var(--gbg)}

/* ══ BADGES & PILLS ════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.b-red{background:var(--rbg);border:1px solid var(--rbd);color:var(--red)}
.b-amber{background:var(--abg);border:1px solid var(--abd);color:var(--amber)}
.b-green{background:var(--gbg);border:1px solid var(--gbd);color:var(--green)}
.b-blue{background:var(--bbg);border:1px solid var(--bbd);color:var(--blue)}
.b-maroon{background:rgba(124,21,34,.07);border:1px solid rgba(124,21,34,.2);color:var(--m)}
.b-gray{background:var(--cream2);border:1px solid var(--cream3);color:var(--ink3)}

/* ══ ALERTS ════════════════════════════════════════ */
.alert{display:flex;gap:10px;padding:10px 13px;border-radius:var(--r);border:1px solid transparent;margin-bottom:7px;align-items:flex-start}
.alert-r{background:var(--rbg);border-color:var(--rbd)}
.alert-a{background:var(--abg);border-color:var(--abd)}
.alert-g{background:var(--gbg);border-color:var(--gbd)}
.alert-b{background:var(--bbg);border-color:var(--bbd)}
.al-ic{font-size:12px;flex-shrink:0;margin-top:1px}
.al-txt{font-size:10px;line-height:1.6;color:var(--ink2)}
.al-txt strong{display:block;font-size:10.5px;margin-bottom:2px;color:var(--ink)}

/* ══ DIMENSION CARD ════════════════════════════════ */
.dim-card{border:1px solid var(--cream3);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.dim-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--cream);border-bottom:1px solid var(--cream3)}
.dim-title{font-size:11px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
.dim-ic{font-size:13px}
.dim-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.dim-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:10px;padding:4px 0;border-bottom:1px solid var(--cream2)}
.dim-row:last-child{border-bottom:none}
.dim-k{color:var(--ink3);flex:1}
.dim-v{font-weight:600;color:var(--ink);text-align:right;flex-shrink:0;margin-left:8px}
.dim-v.ok{color:var(--green)}
.dim-v.warn{color:var(--amber)}
.dim-v.danger{color:var(--red)}

/* ══ CHECKLIST ═════════════════════════════════════ */
.checklist{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r)}
.ck-box{width:14px;height:14px;border:1.5px solid var(--cream3);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.ck-box.check{background:var(--green);border-color:var(--green);color:white;font-size:8px}
.ck-box.cross{background:var(--rbg);border-color:var(--rbd);color:var(--red);font-size:8px}
.ck-lbl{font-size:10px;color:var(--ink2);flex:1;line-height:1.4}
.ck-lbl strong{color:var(--ink);font-weight:600;display:block;margin-bottom:1px}
.ck-pri{font-size:8.5px;padding:1px 7px;border-radius:3px;flex-shrink:0;margin-top:1px}
.pri-crit{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.pri-high{background:var(--abg);color:var(--amber);border:1px solid var(--abd)}
.pri-rec{background:var(--bbg);color:var(--blue);border:1px solid var(--bbd)}

/* ══ CALENDAR ══════════════════════════════════════ */
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.cal-m{border:1px solid var(--cream3);border-radius:var(--r);overflow:hidden}
.cal-mh{background:var(--cream);padding:6px 9px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);border-bottom:1px solid var(--cream3)}
.cal-items{padding:7px 9px;display:flex;flex-direction:column;gap:4px}
.cal-item{font-size:9px;color:var(--ink2);display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cd-red{background:var(--red)}.cd-amber{background:var(--amber)}.cd-blue{background:var(--blue)}.cd-green{background:var(--green)}

/* ══ SCORE BAR ═════════════════════════════════════ */
.score-wrap{margin-bottom:16px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.score-lbl{font-size:10px;color:var(--ink2);width:140px;flex-shrink:0}
.score-bar-bg{flex:1;height:6px;background:var(--cream3);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px}
.score-pct{font-size:10px;font-weight:600;color:var(--ink);width:30px;text-align:right;flex-shrink:0}

/* ══ PROPOSAL / SIGNATURE ══════════════════════════ */
.proposal-box{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px}
.pb-title{font-family:'Cormorant Garamond',serif;font-size:14pt;color:var(--m);margin-bottom:8px}
.service-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--cream3);font-size:10px}
.service-row:last-child{border-bottom:none}
.sr-name{color:var(--ink2);flex:1}
.sr-price{font-weight:600;color:var(--ink);flex-shrink:0}
.sig-area{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}
.sig-box{border-top:1px solid var(--ink3);padding-top:8px}
.sig-lbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.sig-name{font-size:10px;color:var(--ink2);margin-top:4px}

/* ══ DISCLAIMER ════════════════════════════════════ */
.disclaimer{font-size:8.5px;color:var(--ink4);line-height:1.6;padding:12px 14px;background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);margin-top:20px}

/* ══ PAGE HEADER / FOOTER ══════════════════════════ */
.page-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--m);margin-bottom:18px}
.ph-co{font-size:10px;font-weight:600;color:var(--ink3)}
.ph-mark{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;color:var(--m)}
.page-foot{margin-top:16px;padding-top:8px;border-top:1px solid var(--cream3);display:flex;justify-content:space-between;align-items:center}
.pf-txt{font-size:8.5px;color:var(--ink4)}
.pf-pg{font-size:8.5px;color:var(--ink3)}

/* ══ INPUT FORM (screen only) ══════════════════════ */
.input-form{background:#fff;border:1px solid var(--cream3);border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.07);margin-bottom:32px}
.if-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.if-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--m)}
.if-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--m);background:rgba(124,21,34,.06);border:1px solid rgba(124,21,34,.18);padding:3px 9px;border-radius:5px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.fl em{color:var(--m);font-style:normal}
.fi{width:100%;background:var(--cream);border:1.5px solid var(--cream3);color:var(--ink);padding:9px 11px;border-radius:var(--r);font-size:12px;font-family:'Syne',sans-serif;transition:all .15s;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--m);background:#fff;box-shadow:0 0 0 3px rgba(124,21,34,.08)}
.fi::placeholder{color:var(--ink4)}
.fi option{background:#fff}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fi-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flags{display:flex;flex-direction:column;gap:6px}
.flag{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--cream3);background:var(--cream);cursor:pointer;transition:all .15s;user-select:none}
.flag:hover{border-color:rgba(124,21,34,.22)}
.flag.on{border-color:var(--m);background:rgba(124,21,34,.05)}
.flag-l{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink3)}
.flag.on .flag-l{color:var(--ink2)}
.pip{width:32px;height:17px;border-radius:9px;background:var(--cream3);border:1.5px solid var(--cream3);position:relative;transition:all .2s;flex-shrink:0}
.pip::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:var(--ink4);border-radius:50%;transition:all .2s}
.flag.on .pip{background:var(--m);border-color:var(--m)}
.flag.on .pip::after{left:16px;background:#fff}
.btn-gen{width:100%;height:44px;background:var(--m);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .18s;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gen:hover{background:var(--m2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,21,34,.3)}
.sec-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--cream3)}
.divider{border:none;border-top:1px solid var(--cream3);margin:16px 0}

/* ══ REPORT WRAPPER ════════════════════════════════ */
.report{display:block;max-width:820px;margin:0 auto}
@media print{.toolbar{display:none!important}.report{max-width:none}}
</style>
</head>
<body>

<!-- TOOLBAR (screen only) -->
<div class="toolbar no-print">
  <div class="tb-left">
    <div class="tb-mark">م</div>
    <span class="tb-name">Mizaan</span>
    <span class="tb-sub" id="tb-co">Loading report...</span>
  </div>
  <div class="tb-right">
    <button class="tb-btn tb-ghost" onclick="window.location='admin.html'">← Admin</button>
    <button class="tb-btn tb-print" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<div class="wrap">

  <!-- REPORT (generated) -->
  <div class="report" id="report"></div>

</div><!-- /wrap -->

<script>
const CFG={WA:'97451715999',FIRM:'Guardian Consulting',ADDR:'Doha - Qatar',PHONE:'+974 5171 5999',EMAIL:'info@guardianconsultingcompany.com'};
const today=new Date();today.setHours(0,0,0,0);

function fFlip(id){document.getElementById(id).classList.toggle('on');}
function qar(n){return 'QAR '+Math.round(n||0).toLocaleString();}
function fd(d){if(!d)return'-';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fp(s,e){return fd(s)+' – '+fd(e);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function daysFrom(d){const dt=new Date(d);dt.setHours(0,0,0,0);return Math.ceil((dt-today)/86400000);}
function expStatus(d){if(!d)return{lbl:'Not provided',cls:'b-gray'};const dd=daysFrom(d);if(dd<0)return{lbl:'Expired',cls:'b-red'};if(dd<=30)return{lbl:'Expires in '+dd+' days',cls:'b-red'};if(dd<=90)return{lbl:'Expires in '+dd+' days',cls:'b-amber'};return{lbl:'Valid - '+fd(d),cls:'b-green'};}
// FY2025 deadline extended to 30 June 2026
function gtaDeadline(auditFY, qfc) {
  if (auditFY === 2025) return new Date(2026, 5, 30);
  return qfc ? new Date(auditFY + 1, 5, 30) : new Date(auditFY + 1, 3, 30);
}
function penCalc(unfiled){
  const rows=[];let total=0;
  const ty=today.getFullYear();
  if(unfiled>=1){rows.push({l:'Registration failure',a:20000});total+=20000;}
  for(let i=0;i<unfiled;i++){
    const fy=ty-1-i,ddl=gtaDeadline(fy,false);
    if(today<=ddl)continue;
    const days=Math.ceil((today-ddl)/86400000),pen=Math.min(days*500,180000);
    rows.push({l:'Late filing FY '+fy,a:pen});total+=pen;
  }
  return{rows,total};
}
function engine(p){
  const cr=new Date(p.crDate);
  const y=cr.getFullYear(),m=cr.getMonth()+1,late=m>=7,qfc=p.jur==='qfc';
  let rps,rpe,rdl;
  if(!late){rps=new Date(y,0,1);rpe=new Date(y,11,31);rdl=gtaDeadline(y,qfc);}
  else{rps=new Date(cr);rpe=new Date(y+1,11,31);rdl=gtaDeadline(y+1,qfc);}
  if(today>rdl){
    const ty2=today.getFullYear(),lFY=today.getMonth()>=6?ty2-1:ty2-2;
    rps=new Date(lFY,0,1);rpe=new Date(lFY,11,31);rdl=gtaDeadline(lFY,qfc);
  }
  const ms=86400000,overdue=today>rdl,dL=Math.ceil((rdl-today)/ms),dO=overdue?Math.abs(dL):0,urgent=!overdue&&dL<=30;
  const fPct=qfc?100:(100-p.qPct),petro=p.act==='petroleum',rate=petro?.35:.10,rLbl=petro?'35%':'10%';
  const txP=p.profit*(fPct/100),txA=fPct>0&&p.profit>0?txP*rate:0,taxable=fPct>0&&p.profit>0;
  const needsAudit=(p.rev||0)>500000||(p.capital||0)>200000;
  const pen=penCalc(p.unfiled);
  if(overdue){const ty2=today.getFullYear(),lFY=today.getMonth()>=6?ty2-1:ty2-2;pen.rows.unshift({l:'Late filing FY '+lFY,a:Math.min(dO*500,180000)});pen.total+=Math.min(dO*500,180000);}
  const finElig=!overdue&&p.unfiled===0?'green':!overdue&&p.unfiled<=1?'amber':'red';
  let sc=100;
  if(overdue)sc-=35;else if(urgent)sc-=18;else if(dL<=60)sc-=8;
  if(taxable&&txA>0)sc-=12;if(p.wht)sc-=7;if(p.cgt)sc-=8;if(p.exc)sc-=5;
  if(p.unfiled>0)sc-=Math.min(p.unfiled*8,28);
  if(p.acct==='owner'||p.acct==='nobody')sc-=5;
  sc=Math.max(0,Math.min(100,sc));
  // QDB financial maturity score (0-5 based on audit, statements, tax planning)
  let qdbFM=0;
  if(p.acct==='firm'||p.acct==='inhouse')qdbFM++;
  if(needsAudit&&p.acct!=='owner'&&p.acct!=='nobody')qdbFM++;
  if(!overdue&&p.unfiled===0)qdbFM++;
  if(p.rev>500000)qdbFM++;
  if(p.yrs!=='u3')qdbFM++;
  return{rps,rpe,rdl,overdue,urgent,dL,dO,fPct,rate,rLbl,txP,txA,taxable,needsAudit,pen,sc,finElig,qdbFM};
}

// QDB product recommendation
function qdbProduct(p,R){
  const prods=[];
  if(R.finElig==='green'&&p.finNeed!=='equity'&&p.yrs!=='u3'){
    if(p.finNeed==='working')prods.push({n:'Working Capital Finance',d:'Short-term revolving credit line for operational needs.'});
    if(p.finNeed==='assets')prods.push({n:'Asset Finance',d:'Equipment and machinery acquisition with extended repayment.'});
    if(p.finNeed==='supply')prods.push({n:'Supply Chain Finance',d:'Invoice discounting and supplier payment solutions.'});
    if(p.finNeed==='export')prods.push({n:'Export Finance',d:'Pre and post-shipment finance for export businesses.'});
    prods.push({n:'Credit Guarantee Programme',d:'Partial guarantee on bank financing - reduces collateral requirement.'});
  }
  if(p.yrs==='u3')prods.push({n:'Startup Qatar',d:'Pre-seed and seed financing for businesses under 3 years.'});
  if(p.acct==='owner'||p.acct==='nobody')prods.push({n:'Minha Advisory Programme',d:'Free accounting and audit advisory - QDB pays for your accountant through registered providers.'});
  if(!prods.length)prods.push({n:'Not Currently Eligible',d:'Resolve GTA compliance issues before applying. Guardian Consulting can prepare you within one fiscal year.'});
  return prods;
}

// Checklist items
function buildChecklist(p,R){
  const items=[];
  const ok=(l,s,p)=>({ok:true,l,s,p:p||'rec'});
  const no=(l,s,p)=>({ok:false,l,s,p:p||'high'});
  if(!R.overdue&&p.unfiled===0)items.push(ok('Tax returns - up to date','All prior year returns filed via Dhareeba'));
  else items.push(no('File outstanding tax returns immediately','GTA Dhareeba - dhareeba.gov.qa','crit'));
  if(R.needsAudit)items.push(no('Engage GTA-registered auditor for FY audit','Required: revenue >QAR 500k or capital >QAR 200k','crit'));
  else items.push(ok('Audited financial statements - below mandatory threshold'));
  items.push(p.wps==='yes'?ok('WPS - registered and compliant'):no('Register for Wages Protection System (WPS)','Ministry of Labour - mandatory for all private sector','crit'));
  items.push(p.hins?ok('Health insurance - all employees covered'):no('Ensure health insurance for all employees','Compulsory under Qatar Labour Law','high'));
  items.push(p.arFin==='yes'?ok('Arabic financial statements - in place'):no('Prepare Arabic financial statements','Required by Income Tax Law for submission','high'));
  items.push(p.tenYr==='yes'?ok('10-year records in Qatar - compliant'):no('Ensure financial records maintained 10 years in Qatar','GTA audit requirement - Art. 27','high'));
  const crExp=expStatus(p.crExp);items.push(crExp.cls==='b-green'?ok('Commercial Registration - valid','CR expiry: '+fd(p.crExp)):no('Renew Commercial Registration','Expired or expiring within 90 days','crit'));
  const tlExp=expStatus(p.tlExp);items.push(tlExp.cls==='b-green'?ok('Trade License - valid'):no('Renew Trade License','Required for CR renewal and operations','crit'));
  if(p.wht)items.push(no('Reconcile WHT remittances - check all months','Due before 16th monthly to GTA','high'));
  items.push(ok('File GTA penalty exemption application if applicable','GTA 100% waiver initiative - apply via Dhareeba','rec'));
  return items;
}

document.addEventListener('DOMContentLoaded',()=>{
  // Auto-load from localStorage — set by admin.html when "Generate Report" is clicked
  try{
    const raw=localStorage.getItem('mz_report_lead');

    const isDemo = !raw;
    if(!raw){
      const sub=document.getElementById('tb-co');
      if(sub) sub.textContent='Preview — sample data';
    } else {
      document.getElementById('tb-co').textContent=lead.company||'Compliance Report';
    }
    // Map localStorage lead fields to generate() params
    const p={
      co:       lead.company||'',
      crNo:     lead.crNo||'—',
      crDate:   lead.crDate||lead.date||new Date().toISOString().split('T')[0],
      crExp:    lead.crExp||'',
      jur:      lead.jur||lead.jurisdiction||'moci',
      tlExp:    lead.tlExp||'',
      leaseExp: lead.leaseExp||'',
      act:      lead.activity||'general',
      profit:   parseFloat(lead.profit||0),
      rev:      parseFloat(lead.revenue||lead.rev||0),
      capital:  parseFloat(lead.capital||0),
      qPct:     parseFloat(lead.qatariPct!=null?lead.qatariPct:100),

      emp:      parseInt(lead.emp||0),
      qemp:     parseInt(lead.qemp||0),
      unfiled:  parseInt(lead.unfiled||lead.unfiledYears||0),
      acct:     lead.acct||lead.accountant||'firm',

      finNeed:  lead.finNeed||'working',
      attn:     lead.name||'Client',
      wps:      lead.wps||'yes',
      arFin:    'no',
      tenYr:    'yes',
      wht:      !!lead.wht,
      cgt:      !!lead.cgt,
      exc:      !!lead.exc,
      rp:       false,
      hins:     false,
      qdb:      !!lead.qdb,
    };
    generate(p);
  }catch(e){
    showError('Error loading report data: '+e.message);
  }
});

function showError(msg){
  document.getElementById('report').innerHTML=`<div style="padding:60px 40px;text-align:center;color:#6b6058"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Report could not load</div><div style="font-size:13px;line-height:1.6">${msg}</div><div style="margin-top:20px"><a href="admin.html" style="color:#7c1522;font-weight:600">← Return to Admin</a></div></div>`;
}
