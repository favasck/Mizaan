<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mizaan - Investment Readiness Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --m:#7c1522;--m2:#9c2232;
  --gold:#b8892a;--gold2:#d4a843;
  --cream:#f8f4ef;--cream2:#f0ebe3;--cream3:#e4dcd2;
  --bg:#ffffff;
  --ink:#1a1410;--ink2:#2d2926;--ink3:#6b6058;--ink4:#9a8e87;
  --green:#14532d;--gbg:#f0fdf4;--gbd:#bbf7d0;
  --amber:#78350f;--abg:#fffbeb;--abd:#fde68a;
  --red:#7f1d1d;--rbg:#fef2f2;--rbd:#fecaca;
  --blue:#1e3a5f;--bbg:#eff6ff;--bbd:#bfdbfe;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;color:var(--ink);background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{size:A4;margin:16mm 14mm 18mm 14mm}
@media print{
  .toolbar{display:none!important}
  body{background:#fff}
}

/* TOOLBAR */
.toolbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--m);box-shadow:0 2px 8px rgba(0,0,0,.14);z-index:100}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-mark{width:30px;height:30px;background:var(--gold2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--ink)}
.tb-name{font-size:14px;font-weight:700;color:white}
.tb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-left:4px}
.tb-r{display:flex;gap:8px}
.tb-btn{height:32px;padding:0 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;border:none}
.tb-ghost{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2)}
.tb-ghost:hover{background:rgba(255,255,255,.2)}
.tb-print{background:var(--gold2);color:var(--ink)}
.tb-print:hover{background:white;color:var(--m)}

/* WRAPPER */
.wrap{max-width:820px;margin:0 auto;padding:72px 20px 60px}
@media print{.wrap{max-width:none;padding:0}}

/* COVER / HEADER */
.cover{background:var(--m);border-radius:14px;padding:32px 36px;margin-bottom:20px;color:white;position:relative;overflow:hidden}
.cover::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(212,168,67,.07);border-radius:50%}
.cover::before{content:'';position:absolute;bottom:-40px;left:-40px;width:140px;height:140px;background:rgba(255,255,255,.03);border-radius:50%}
.cover-inner{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
.cover-l{}
.cov-eyebrow{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.45);margin-bottom:8px}
.cov-title{font-family:'Cormorant Garamond',serif;font-size:26pt;font-weight:400;line-height:1.05;letter-spacing:-.02em;color:white;margin-bottom:6px}
.cov-title em{color:var(--gold2);font-style:italic}
.cov-sub{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:18px}
.cov-fields{display:flex;flex-direction:column;gap:6px}
.cf-row{display:flex;align-items:baseline;gap:8px}
.cf-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.38);width:70px;flex-shrink:0}
.cf-val{font-size:12px;font-weight:600;color:white}
.cover-r{text-align:center;flex-shrink:0}
.big-score{font-family:'Cormorant Garamond',serif;font-size:58pt;font-weight:500;line-height:1;color:white}
.big-score span{font-size:22pt;opacity:.45;font-weight:400}
.big-band{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;padding:4px 12px;border-radius:100px;display:inline-block}
.band-green{background:rgba(20,83,45,.4);color:#86efac;border:1px solid rgba(134,239,172,.25)}
.band-blue{background:rgba(30,58,95,.4);color:#93c5fd;border:1px solid rgba(147,197,253,.25)}
.band-amber{background:rgba(120,53,15,.4);color:#fcd34d;border:1px solid rgba(252,211,77,.25)}
.band-red{background:rgba(127,29,29,.4);color:#fca5a5;border:1px solid rgba(252,165,165,.25)}

/* SECTION */
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--cream3)}

/* PILLAR BARS */
.pillars-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pillar-card{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);padding:12px 14px}
.pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pc-lbl{font-size:11px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px}
.pc-ic{font-size:13px}
.pc-pct{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500}
.pc-bar-bg{height:6px;background:var(--cream3);border-radius:3px;overflow:hidden}
.pc-bar{height:100%;border-radius:3px}
.pc-weight{font-size:9px;color:var(--ink4);margin-top:5px}

/* RADAR */
.radar-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;align-items:center}
.radar-box{text-align:center}
.radar-box canvas{max-width:240px;width:100%}
.radar-legend{display:flex;flex-direction:column;gap:8px;justify-content:center}
.rl-item{display:flex;align-items:center;gap:8px;font-size:11px}
.rl-ic{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.rl-lbl{color:var(--ink2);font-weight:600}
.rl-pct{margin-left:auto;font-weight:700;font-family:'Cormorant Garamond',serif;font-size:16px}

/* GAPS */
.gaps{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.gap-item{display:flex;gap:12px;padding:12px 14px;background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r)}
.gap-num{width:22px;height:22px;border-radius:50%;background:var(--m);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gap-content{}
.gap-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px}
.gap-action{font-size:11px;color:var(--ink3);line-height:1.5}

/* ROADMAP */
.roadmap{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
.rm-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.rm-label{font-size:11px;font-weight:600;color:var(--ink2)}
.rm-eta{font-size:11px;color:var(--m);font-weight:600}
.rm-track{height:8px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));border-radius:4px;position:relative;margin-bottom:6px}
.rm-marker{position:absolute;top:-5px;width:18px;height:18px;border-radius:50%;background:var(--m);border:2px solid white;box-shadow:0 0 0 2px var(--m);transform:translateX(-50%)}
.rm-target{position:absolute;top:-5px;left:80%;width:18px;height:18px;border-radius:50%;background:var(--green);border:2px solid white;box-shadow:0 0 0 2px var(--green);transform:translateX(-50%)}
.rm-ends{display:flex;justify-content:space-between;font-size:9.5px;color:var(--ink4)}

/* QDB */
.qdb-box{background:var(--bbg);border:1px solid var(--bbd);border-radius:var(--r);padding:13px 15px;margin-bottom:16px}
.qdb-title{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.qdb-rows{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qdb-row{font-size:11px;display:flex;flex-direction:column;gap:2px}
.qdb-k{color:var(--blue);opacity:.75;font-size:10px}
.qdb-v{color:var(--blue);font-weight:600}

/* OPT-IN */
.optin-box{background:var(--bbg);border:1px solid var(--bbd);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:11px;color:var(--blue)}

/* PROPOSAL */
.proposal{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
.prop-title{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--m);margin-bottom:8px}
.prop-items{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.prop-item{font-size:11px;color:var(--ink2);display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.prop-item::before{content:'✓';color:var(--m);font-weight:700;flex-shrink:0;margin-top:1px}

/* SIG */
.sig-area{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:18px}
.sig-box{border-top:1px solid var(--ink4);padding-top:8px}
.sig-lbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.sig-name{font-size:10px;color:var(--ink2);margin-top:36px}

/* FOOTER */
.footer{margin-top:14px;padding-top:8px;border-top:1px solid var(--cream3);display:flex;justify-content:space-between;align-items:center}
.ft-l{font-size:8.5px;color:var(--ink4)}
.ft-r{font-size:8.5px;color:var(--ink3)}
.disclaimer{font-size:8px;color:var(--ink4);line-height:1.6;margin-top:10px;padding:10px 12px;background:var(--cream);border-radius:var(--r)}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-l">
    <div class="tb-mark">م</div>
    <span class="tb-name">Mizaan</span>
    <span class="tb-sub" id="tb-co">Loading scorecard...</span>
  </div>
  <div class="tb-r">
    <button class="tb-btn tb-ghost" onclick="window.location='admin.html'">← Admin</button>
    <button class="tb-btn tb-print" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<div class="wrap" id="wrap">
  <div style="padding:80px 40px;text-align:center;color:#9a8e87">
    <div style="font-size:32px;margin-bottom:12px">📊</div>
    <div style="font-size:14px;font-weight:600">Loading scorecard...</div>
    <div style="font-size:12px;margin-top:6px">Open this page from the Admin dashboard</div>
    <div style="margin-top:16px"><a href="admin.html" style="color:#7c1522;font-weight:600">← Return to Admin</a></div>
  </div>
</div>

<script>
const CFG={FIRM:'Guardian Consulting',ADDR:'Doha, Qatar',PHONE:'+974 5171 5999'};

const PILLARS=[
  {key:'financial', ic:'💰',en:'Financial Health',  ar:'الصحة المالية',  w:.25},
  {key:'compliance',ic:'⚖️', en:'Compliance',        ar:'الامتثال',       w:.20},
  {key:'business',  ic:'🎯',en:'Business Model',    ar:'نموذج الأعمال',  w:.20},
  {key:'operations',ic:'⚙️', en:'Operations',        ar:'العمليات',       w:.15},
  {key:'leadership',ic:'👥',en:'Leadership',         ar:'القيادة',        w:.10},
  {key:'growth',    ic:'📈',en:'Growth Potential',   ar:'إمكانية النمو',  w:.10},
];

function qar(n){return 'QAR '+Math.round(n||0).toLocaleString();}
function fd(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'-';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getBand(s){
  if(s>=80)return{en:'Investment Ready',col:'#14532d',cls:'band-green'};
  if(s>=60)return{en:'Growth Ready',    col:'#1e3a5f',cls:'band-blue'};
  if(s>=40)return{en:'Developing',      col:'#78350f',cls:'band-amber'};
  return{en:'Early Stage',col:'#7f1d1d',cls:'band-red'};
}
function etaMonths(s){
  const g=80-s;
  if(g<=0)return 'Already investment ready';
  if(g<=10)return '~3 months with focused effort';
  if(g<=20)return '~6 months with structured support';
  if(g<=30)return '~9–12 months with a clear roadmap';
  return '12–18 months - start with compliance';
}
function gapAction(key){
  const a={
    financial:'Engage a GTA-registered auditor and prepare annual audited accounts.',
    compliance:'File all outstanding GTA returns immediately and renew any expired documents.',
    business:'Document your value proposition and build a structured customer acquisition process.',
    operations:'Document core processes and implement accounting or ERP software.',
    leadership:'Define management roles formally and identify a succession candidate.',
    growth:'Write a 1-page strategic plan with 3 measurable goals for the next 12 months.',
  };
  return a[key]||'Work with your Guardian Consulting advisor to improve this area.';
}
function pillarColor(pct){
  if(pct>=70)return'#14532d';if(pct>=40)return'#78350f';return'#7f1d1d';
}
function qdbNote(score,pcts){
  if(score>=70&&pcts.compliance>=60)return{t:'Likely eligible',s:'Compliance and financial documentation are the key requirements for your QDB application.',ok:true};
  if(pcts.compliance<50)return{t:'Not currently eligible',s:'Filing outstanding tax returns is the single most impactful action before a QDB application.',ok:false};
  return{t:'Borderline eligible',s:'With focused improvements in compliance and financial documentation, QDB eligibility can be achieved within 6–12 months.',ok:null};
}

function renderScorecard(lead){
  const pcts=lead.pillarPcts||{financial:0,compliance:0,business:0,operations:0,leadership:0,growth:0};
  const total=lead.investScore||0;
  const band=getBand(total);
  const sorted=[...PILLARS].map(p=>({...p,pct:pcts[p.key]||0})).sort((a,b)=>a.pct-b.pct);
  const gaps=sorted.slice(0,3);
  const qdb=qdbNote(total,pcts);

  document.getElementById('tb-co').textContent=lead.company||'Investment Scorecard';

  document.getElementById('wrap').innerHTML=`

  <!-- COVER -->
  <div class="cover">
    <div class="cover-inner">
      <div class="cover-l">
        <div class="cov-eyebrow">Mizaan ميزان · Qatar Investment Intelligence</div>
        <div class="cov-title">Investment<br><em>Readiness Score</em></div>
        <div class="cov-sub">Prepared by ${esc(CFG.FIRM)} · ${fd(new Date())}</div>
        <div class="cov-fields">
          <div class="cf-row"><span class="cf-lbl">Company</span><span class="cf-val">${esc(lead.company||'-')}</span></div>
          <div class="cf-row"><span class="cf-lbl">Prepared for</span><span class="cf-val">${esc(lead.name||'-')}</span></div>
          <div class="cf-row"><span class="cf-lbl">Sector</span><span class="cf-val">${esc(lead.sector||'-')}</span></div>
          <div class="cf-row"><span class="cf-lbl">Date</span><span class="cf-val">${fd(new Date())}</span></div>
        </div>
      </div>
      <div class="cover-r">
        <div class="big-score">${total}<span>/100</span></div>
        <div class="big-band ${band.cls}">${band.en}</div>
      </div>
    </div>
  </div>

  <!-- PILLAR SCORES + RADAR -->
  <div class="sec-title">Score by pillar</div>
  <div class="radar-section">
    <div class="radar-box"><canvas id="sc-radar" width="240" height="240"></canvas></div>
    <div class="radar-legend">
      ${PILLARS.map(p=>`<div class="rl-item">
        <span class="rl-ic">${p.ic}</span>
        <span class="rl-lbl">${p.en}</span>
        <span class="rl-pct" style="color:${pillarColor(pcts[p.key]||0)}">${pcts[p.key]||0}%</span>
      </div>`).join('')}
    </div>
  </div>

  <div class="pillars-grid">
    ${PILLARS.map(p=>{
      const pct=pcts[p.key]||0;
      const col=pillarColor(pct);
      return `<div class="pillar-card">
        <div class="pc-head">
          <div class="pc-lbl"><span class="pc-ic">${p.ic}</span>${p.en}</div>
          <div class="pc-pct" style="color:${col}">${pct}%</div>
        </div>
        <div class="pc-bar-bg"><div class="pc-bar" style="width:${pct}%;background:${col}"></div></div>
        <div class="pc-weight">Weight: ${Math.round(p.w*100)}% of total score</div>
      </div>`;}).join('')}
  </div>

  <!-- ROADMAP -->
  <div class="sec-title">Path to investment ready</div>
  <div class="roadmap">
    <div class="rm-top">
      <div class="rm-label">Current: ${total}/100 - ${band.en}</div>
      <div class="rm-eta">⏱ ${etaMonths(total)}</div>
    </div>
    <div class="rm-track">
      <div class="rm-marker" style="left:${total}%"></div>
      <div class="rm-target"></div>
    </div>
    <div class="rm-ends"><span>0 - Early Stage</span><span>40 - Developing</span><span>60 - Growth Ready</span><span style="color:var(--green);font-weight:600">80+ - Investment Ready</span></div>
  </div>

  <!-- TOP 3 GAPS -->
  <div class="sec-title">Top 3 improvement areas</div>
  <div class="gaps">
    ${gaps.map((g,i)=>`<div class="gap-item">
      <div class="gap-num">${i+1}</div>
      <div class="gap-content">
        <div class="gap-title">${g.ic} ${g.en} - ${g.pct}%</div>
        <div class="gap-action">${gapAction(g.key)}</div>
      </div>
    </div>`).join('')}
  </div>

  <!-- QDB -->
  <div class="sec-title">QDB financing readiness</div>
  <div class="qdb-box">
    <div class="qdb-title">🏦 Qatar Development Bank - ${qdb.t}</div>
    <div style="font-size:11px;color:var(--blue);margin-bottom:10px">${qdb.s}</div>
    <div class="qdb-rows">
      <div class="qdb-row"><span class="qdb-k">Compliance score</span><span class="qdb-v">${pcts.compliance||0}%${(pcts.compliance||0)>=60?' ✓':' - needs improvement'}</span></div>
      <div class="qdb-row"><span class="qdb-k">Financial health</span><span class="qdb-v">${pcts.financial||0}%</span></div>
      <div class="qdb-row"><span class="qdb-k">Operations readiness</span><span class="qdb-v">${pcts.operations||0}%</span></div>
      <div class="qdb-row"><span class="qdb-k">Overall readiness</span><span class="qdb-v">${total}/100 - ${band.en}</span></div>
    </div>
  </div>

  <!-- OPT-IN -->
  ${lead.optIn?`<div class="optin-box">✅ <strong>${esc(lead.company)}</strong> has consented to be added to the Mizaan investor network. Guardian Consulting will reach out if an investor expresses interest in this profile.</div>`:''}

  <!-- PROPOSAL -->
  <div class="sec-title">Guardian Consulting - recommended next steps</div>
  <div class="proposal">
    <div class="prop-title">How we can help you reach Investment Ready</div>
    <div class="prop-items">
      ${[
        ['GTA compliance review and filing','Resolve any outstanding tax returns and ensure full GTA compliance'],
        ['Financial statement preparation','Prepare audited accounts - required for QDB and investor due diligence'],
        ['Investment readiness advisory','Structured 90-day programme to raise your score to 80+'],
        ['QDB application support','Full preparation of QDB application package with financial projections'],
        ['Investor introduction service','Curated introductions from the Mizaan investor network'],
        ['Outsourced CFO / financial management','Monthly financial oversight and reporting for growing businesses'],
      ].map(([t,d])=>`<div class="prop-item"><div><strong style="font-size:11.5px;display:block;margin-bottom:2px">${esc(t)}</strong><span style="font-size:10px;color:var(--ink3)">${esc(d)}</span></div></div>`).join('')}
    </div>
  </div>

  <!-- SIGNATURE -->
  <div class="sig-area">
    <div class="sig-box">
      <div class="sig-lbl">Prepared by - ${esc(CFG.FIRM)}</div>
      <div class="sig-name">${esc(CFG.FIRM)}<br>${esc(CFG.PHONE)}</div>
    </div>
    <div class="sig-box">
      <div class="sig-lbl">Acknowledged - ${esc(lead.company||'')}</div>
      <div class="sig-name">${esc(lead.name||'')}</div>
    </div>
  </div>

  <div class="footer">
    <div class="ft-l">Confidential · ${esc(lead.company||'')} · ${fd(new Date())}</div>
    <div class="ft-r">Powered by Mizaan ميزان</div>
  </div>
  <div class="disclaimer">This scorecard is prepared by ${esc(CFG.FIRM)} based on self-reported information provided by the client. Scores are indicative and should not be construed as a guarantee of investment eligibility, financing approval, or investor interest. Guardian Consulting accepts no liability for decisions made solely on the basis of this assessment. All recommendations should be verified by a qualified professional. Powered by Mizaan ميزان - Qatar Investment Intelligence Platform.</div>
  `;

  // Draw radar chart after DOM is ready
  setTimeout(()=>{
    const canvas=document.getElementById('sc-radar');
    if(!canvas||typeof Chart==='undefined')return;
    new Chart(canvas,{
      type:'radar',
      data:{
        labels:PILLARS.map(p=>p.en),
        datasets:[
          {label:'Investment Ready (80)',data:[80,80,80,80,80,80],
           borderColor:'rgba(20,83,45,.4)',backgroundColor:'rgba(20,83,45,.05)',
           borderWidth:1.5,borderDash:[5,4],pointRadius:0,pointHoverRadius:0},
          {label:'Score',data:PILLARS.map(p=>pcts[p.key]||0),
           borderColor:'#7c1522',backgroundColor:'rgba(124,21,34,.14)',
           borderWidth:2.5,pointBackgroundColor:'#7c1522',
           pointRadius:4,pointHoverRadius:6,pointBorderColor:'white',pointBorderWidth:2},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:true,
        scales:{r:{min:0,max:100,
          ticks:{stepSize:25,font:{size:8},color:'#9a8e87',backdropColor:'rgba(255,255,255,.7)'},
          grid:{color:'rgba(0,0,0,.07)'},angleLines:{color:'rgba(0,0,0,.08)'},
          pointLabels:{font:{size:9,family:'Syne',weight:'600'},color:'#6b6058',padding:6}}},
        plugins:{legend:{display:false}},
        animation:{duration:800}
      }
    });
  },300);
}

const DEMO_SCORECARD = {
  name:'Ahmed Al-Rashid', company:'Al Rashid Trading W.L.L.',
  sector:'trading', investScore:61, investBand:'Growth Ready', optIn:true,
  pillarPcts:{financial:75,compliance:50,business:65,operations:58,leadership:50,growth:67},
  date:new Date().toLocaleDateString('en-GB'),
};
document.addEventListener('DOMContentLoaded',()=>{
  try{
    const raw=localStorage.getItem('mz_scorecard_lead');
    const lead = raw ? JSON.parse(raw) : DEMO_SCORECARD;
    const isDemo = !raw;
    if(isDemo){
      const sub=document.getElementById('tb-co');
      if(sub) sub.textContent='Preview — sample data';
    }
    renderScorecard(lead);
  }catch(e){
    document.getElementById('wrap').innerHTML=`<div style="padding:80px 40px;text-align:center;color:#9a8e87"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:14px;font-weight:600">Error loading scorecard: ${e.message}</div><div style="margin-top:16px"><a href="admin.html" style="color:#7c1522;font-weight:600">← Return to Admin</a></div></div>`;
  }
});
</script>
